services:
  mongo:
    image: mongo
    restart: unless-stopped
    command: mongod --quiet --logpath /dev/null
    env_file: .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_PASSWORD}
    ports:
      - 127.0.0.1:27017:27017
    volumes:
      - ./.mongo:/data/db

  spiffo:
    restart: unless-stopped
    depends_on:
      - mongo
    build:
      dockerfile: dockerfile
    env_file: .env
    